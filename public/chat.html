<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FGS Messenger</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body onload="initChat()">

<div class="app">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">

    <!-- SEARCH -->
    <div class="search-block">
      <input 
        type="text" 
        id="userSearch"
        placeholder="Поиск @username..."
        oninput="searchUsers(this.value)"
      >
      <div id="searchResults" class="search-results"></div>
    </div>

    <!-- CHAT LIST -->
    <div class="chat-list" id="chatList">

      <div class="chat-item active" onclick="switchChat('global')">
        🌍 Общий чат
      </div>

    </div>

    <div class="sidebar-footer">
      <button onclick="openProfile()">Настройки профиля</button>
      <button onclick="logout()">Выйти</button>
    </div>

  </aside>

  <!-- ===== MAIN CHAT ===== -->
  <main class="chat">

    <!-- HEADER -->
    <header class="chat-header">
      <h2 id="chatTitle">Общий чат</h2>
      <button onclick="startCall()">📞</button>
    </header>

    <!-- MESSAGES -->
    <section class="messages" id="messagesContainer">
    </section>

    <!-- INPUT PANEL -->
    <footer class="chat-input">

      <input 
        type="file" 
        id="fileInput" 
        hidden 
        accept="image/*,video/*"
        onchange="uploadMedia(this)"
      >

      <button onclick="document.getElementById('fileInput').click()">📎</button>

      <input 
        type="text" 
        id="messageInput"
        placeholder="Сообщение..."
        onkeydown="if(event.key==='Enter') sendText()"
      >

      <button onclick="toggleAudioRec()">🎤</button>

      <button onclick="sendText()">➤</button>

    </footer>

  </main>

</div>

<!-- ===== CALL MODAL ===== -->

<div id="callModal" class="call-modal hidden">
  <div class="call-box">
    <h3>Звонок</h3>

    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>

    <div class="call-buttons">
      <button onclick="toggleMuteCall()">Микрофон</button>
      <button onclick="toggleCamera()">Камера</button>
      <button onclick="endCurrentCall()">Завершить</button>
    </div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
