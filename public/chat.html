<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>One Messenger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Затемнение фона для мобильной версии -->
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Сайдбар (левый) -->
    <aside id="sidebar" class="sidebar mobile-hidden">
      <div class="side-top">
        <div class="side-top">
  <!-- Сворачиваемый поиск -->
  <div class="search-container">
    <div class="search-toggle" onclick="toggleSearch()">
      <span>🔍</span>
      <span>Поиск...</span>
    </div>
    <div id="searchExpanded" class="search-expanded hidden">
      <span>🔍</span>
      <input id="searchInput" placeholder="Поиск @username..." oninput="searchUsers(this.value)">
      <span class="close-search" onclick="closeSearch()">✕</span>
    </div>
  </div>

  <!-- Истории с кнопкой сворачивания -->
  <div class="stories-header">
    <span>Истории</span>
    <span class="toggle-stories" onclick="toggleStories()">▼</span>
  </div>
  <div id="storiesContainer" class="stories">
    <button class="story-add" onclick="openStoryComposer()" title="Добавить сторис">
      <span>➕</span>
    </button>
    <div id="storiesList" class="stories-list"></div>
  </div>
</div>
        <!-- Компактный поиск -->
        <div class="search">
          <span>🔍</span>
          <input id="searchInput" placeholder="Поиск @username..." oninput="searchUsers(this.value)">
        </div>

        <!-- Истории -->
        <div class="stories">
          <button class="story-add" onclick="openStoryComposer()" title="Добавить сторис">
            <span>➕</span>
          </button>
          <div id="storiesList" class="stories-list"></div>
        </div>
      </div>

      <!-- Список чатов (занимает максимум места) -->
      <div class="chatlist">
        <button class="chatitem active" data-chat="global" onclick="openChat('global')">
          <div class="avatar">
            <span>🌐</span>
          </div>
          <div class="meta">
            <div class="name">Общий чат</div>
            <div class="preview">общение со всеми</div>
          </div>
        </button>

        <div id="privateChats"></div>
        <div id="searchResults"></div>
      </div>

      <!-- Кнопка настроек внизу -->
      <div class="side-bottom">
        <button class="btn ghost full" onclick="openSettings()">
          <span>👤</span> Настройки профиля
        </button>
      </div>
    </aside>

    <!-- Основная область чата (правая) -->
    <main class="main">
      <header class="topbar">
        <button class="iconbtn mobile" onclick="toggleSidebar()">
          <span>☰</span>
        </button>
        <div class="title" onclick="openCurrentProfile()">
          <div id="chatTitle" class="h">Общий чат</div>
          <div id="chatSub" class="s">общение со всеми</div>
        </div>

        <div class="actions">
          <button id="callBtn" class="iconbtn" onclick="startCall()" title="Аудиозвонок">
            <span>📞</span>
          </button>
          <button class="iconbtn" onclick="logout()" title="Выйти">
            <span>🚪</span>
          </button>
        </div>
      </header>

      <div id="birthdayBanner" class="banner hidden"></div>

      <section id="messages" class="messages"></section>

      <!-- Панель ввода сообщения -->
      <footer class="composer">
        <button class="iconbtn" onclick="document.getElementById('fileInput').click()" title="Фото/Видео">
          <span>📎</span>
        </button>
        <input id="fileInput" type="file" hidden accept="image/*,video/*" onchange="sendMedia(this)">

        <input id="textInput" class="text" placeholder="Сообщение..." onkeydown="onEnter(event)">

        <button id="voiceBtn" class="iconbtn" title="Голосовое (удерживать)">
          <span>🎤</span>
        </button>

        <button class="iconbtn send" onclick="sendText()" title="Отправить">
          <span>➡️</span>
        </button>
      </footer>
    </main>
  </div>

  <!-- Модальные окна (без изменений) -->
  <div id="profileModal" class="modal hidden">
    <div class="card">
      <div class="cardtop">
        <div class="cardtitle">Профиль</div>
        <button class="iconbtn" onclick="closeProfile()"><span>❌</span></button>
      </div>
      <div class="profile">
        <div class="avatar big" id="profileAvatar"><span>👤</span></div>
        <div class="profiletext">
          <div class="pname" id="profileName"></div>
          <div class="puser" id="profileUser"></div>
          <div class="pbio" id="profileBio"></div>
          <div class="pbirth" id="profileBirth"></div>
        </div>
      </div>
      <div id="profileActions" class="row"></div>
    </div>
  </div>

  <div id="settingsModal" class="modal hidden">
    <div class="card">
      <div class="cardtop">
        <div class="cardtitle">Настройки профиля</div>
        <button class="iconbtn" onclick="closeSettings()"><span>❌</span></button>
      </div>
      <div class="formgrid">
        <label>Display name</label>
        <input id="setDisplayName" placeholder="Имя">
        <label>Bio</label>
        <input id="setBio" placeholder="О себе">
        <label>Дата рождения (YYYY-MM-DD)</label>
        <input id="setBirthDate" placeholder="2009-01-31">
        <label>Аватар (URL)</label>
        <input id="setAvatarUrl" placeholder="https://...">
        <label>Загрузить аватар</label>
        <input id="avatarFile" type="file" accept="image/*">
        <button class="btn primary full" onclick="saveProfile()">
          <span>💾</span> Сохранить
        </button>
        <button class="btn danger full" onclick="confirmDeleteAccount()" style="margin-top: 16px;">
          <span>🗑️</span> Удалить аккаунт
        </button>
      </div>
    </div>
  </div>

  <div id="storyModal" class="modal hidden">
    <div class="card">
      <div class="cardtop">
        <div class="cardtitle">Новая сторис</div>
        <button class="iconbtn" onclick="closeStoryComposer()"><span>❌</span></button>
      </div>
      <div class="formgrid">
        <label>Файл (не обязательно)</label>
        <input id="storyFile" type="file" accept="image/*,video/*">
        <label>Текст (не обязательно)</label>
        <input id="storyText" maxlength="120" placeholder="Текст...">
        <button class="btn primary full" onclick="publishStory()">Опубликовать</button>
      </div>
    </div>
  </div>

  <audio id="remoteAudio" autoplay playsinline></audio>

  <div id="incomingCallModal" class="modal hidden">
    <div class="card callcard">
      <div class="cardtop">
        <div class="cardtitle">Входящий звонок</div>
        <button class="iconbtn" onclick="declineIncomingCall()"><span>❌</span></button>
      </div>
      <div id="incomingCallText" class="callstatus">Кто-то звонит…</div>
      <div class="row">
        <button class="btn primary" onclick="acceptIncomingCall()">Принять</button>
        <button class="btn danger" onclick="declineIncomingCall()">Отклонить</button>
      </div>
    </div>
  </div>

  <div id="callModal" class="modal hidden">
    <div class="card callcard">
      <div class="cardtop">
        <div class="cardtitle">Звонок</div>
        <button class="iconbtn" onclick="endCall()"><span>❌</span></button>
      </div>
      <div id="callStatus" class="callstatus">Соединение...</div>
      <div class="row" style="justify-content: center;">
        <button id="muteBtn" class="btn ghost" onclick="toggleMute()">🔇 Выключить микрофон</button>
      </div>
      <div class="row">
        <button class="btn danger full" onclick="endCall()">🔚 Завершить</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
