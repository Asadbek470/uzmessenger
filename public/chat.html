<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Messenger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="top-panel">
        <span class="emoji-btn" id="search-btn">🔍</span>
        <input type="text" id="search-input" class="input" placeholder="Search users">
        <span class="emoji-btn" id="stories-btn">📖</span>
        <span class="emoji-btn toggle-arrow">▼</span>
      </div>
      <div class="chats-list"></div>
      <div class="bottom-buttons">
        <span class="emoji-btn" id="create-group">👥</span>
        <span class="emoji-btn" id="settings">👤</span>
      </div>
    </div>
    <div class="chat-area">
      <div class="chat-header">
        <span class="back-btn emoji-btn">⬅️</span>
        <div class="chat-info">
          <span id="chat-title"></span>
          <span id="chat-status"></span>
        </div>
        <span class="emoji-btn" id="call-btn">📞</span>
        <span class="emoji-btn" id="exit-btn">🚪</span>
      </div>
      <div class="messages"></div>
      <div class="input-panel">
        <input type="text" id="message-input" class="input" placeholder="Type a message">
        <span class="emoji-btn" id="attach-btn">📎</span>
        <span class="emoji-btn" id="mic-btn">🎤</span>
        <span class="emoji-btn" id="send-btn">➡️</span>
      </div>
    </div>
  </div>

  <!-- Modals -->
  <div id="profile-modal" class="modal"></div>
  <div id="settings-modal" class="modal">
    <div class="modal-content">
      <h2>Settings</h2>
      <input type="text" id="display-name" class="input" placeholder="Display Name">
      <textarea id="bio" class="input" placeholder="Bio"></textarea>
      <input type="date" id="birth-date" class="input">
      <input type="file" id="avatar-input" class="input">
      <button id="save-profile" class="btn primary">Save</button>
      <h3>Sessions</h3>
      <div id="sessions-list"></div>
      <button id="delete-account" class="btn danger">Delete Account</button>
    </div>
  </div>
  <div id="create-group-modal" class="modal">
    <div class="modal-content">
      <input type="text" id="group-name" class="input" placeholder="Group Name">
      <textarea id="group-desc" class="input" placeholder="Description"></textarea>
      <input type="text" id="group-members" class="input" placeholder="Usernames (comma-separated)">
      <button id="create-group-btn" class="btn primary">Create</button>
    </div>
  </div>
  <div id="group-info-modal" class="modal"></div>
  <div id="incoming-call-modal" class="modal">
    <div class="modal-content">
      <h2>Incoming Call from <span id="caller"></span></h2>
      <button id="accept-call" class="btn primary">Accept</button>
      <button id="reject-call" class="btn danger">Reject</button>
    </div>
  </div>
  <div id="call-modal" class="modal">
    <div class="modal-content">
      <h2>Call with <span id="call-peer"></span></h2>
      <button id="end-call" class="btn danger">End Call</button>
    </div>
  </div>
  <div id="stories-modal" class="modal"></div>

  <script src="app.js"></script>
</body>
</html>
