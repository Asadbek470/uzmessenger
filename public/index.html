<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>One Messenger — Вход</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <h1>One Messenger</h1>
    <p>Вход без номера телефона</p>

    <div class="tabs">
      <button id="tabLogin" class="tab active" onclick="setTab('login')">Войти</button>
      <button id="tabReg" class="tab" onclick="setTab('reg')">Регистрация</button>
    </div>

    <div class="form">
      <label>@username</label>
      <input id="identifier" placeholder="asadbек000" autocomplete="username" />

      <label>Пароль</label>
      <input id="password" type="password" placeholder="••••" autocomplete="current-password" />

      <button class="btn primary" onclick="submitAuth()">Продолжить</button>
      <div id="authError" class="error"></div>
    </div>

    <div class="hint">
      Юзернейм: 4-20 символов (a-z, 0-9, _)
    </div>
  </div>

  <script>
    let mode = "login";
    function setTab(m) {
      mode = m;
      document.getElementById("tabLogin").classList.toggle("active", m === "login");
      document.getElementById("tabReg").classList.toggle("active", m === "reg");
      document.getElementById("authError").textContent = "";
    }

    async function submitAuth() {
      const identifier = document.getElementById("identifier").value.trim();
      const password = document.getElementById("password").value.trim();
      const errEl = document.getElementById("authError");
      errEl.textContent = "";

      if (!identifier || !password) {
        errEl.textContent = "Заполни все поля";
        return;
      }

      const url = mode === "reg" ? "/api/auth/register" : "/api/auth/login";

      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(mode === "reg"
          ? { username: identifier, password }
          : { identifier, password }
        )
      });

      const data = await res.json();
      if (!data.ok) {
        errEl.textContent = data.error || "Ошибка";
        return;
      }

      localStorage.setItem("token", data.token);
      localStorage.setItem("me", JSON.stringify(data.user));
      location.href = "chat.html";
    }
  </script>
</body>
</html>
