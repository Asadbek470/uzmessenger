<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Messenger - Login/Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="auth-tabs">
      <button id="login-tab" class="active">Login</button>
      <button id="register-tab">Register</button>
    </div>
    <form id="auth-form">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Submit</button>
    </form>
    <div id="confirm-modal" class="modal" style="display: none;">
      <input type="text" id="code" placeholder="Confirmation Code">
      <button id="confirm-btn">Confirm</button>
    </div>
  </div>
  <script>
    const loginTab = document.getElementById('login-tab');
    const registerTab = document.getElementById('register-tab');
    const form = document.getElementById('auth-form');
    const confirmModal = document.getElementById('confirm-modal');
    const confirmBtn = document.getElementById('confirm-btn');
    let isLogin = true;
    let deviceId = localStorage.getItem('deviceId') || crypto.randomUUID();
    localStorage.setItem('deviceId', deviceId);
    let deviceName = navigator.userAgent;

    loginTab.addEventListener('click', () => {
      isLogin = true;
      loginTab.classList.add('active');
      registerTab.classList.remove('active');
    });

    registerTab.addEventListener('click', () => {
      isLogin = false;
      registerTab.classList.add('active');
      loginTab.classList.remove('active');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';

      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identifier: username, username, password, deviceId, deviceName })
      });
      const data = await res.json();

      if (data.ok) {
        if (data.requireConfirm) {
          confirmModal.style.display = 'block';
          confirmBtn.onclick = async () => {
            const code = document.getElementById('code').value;
            const confirmRes = await fetch('/api/auth/confirm', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username, code, deviceId })
            });
            const confirmData = await confirmRes.json();
            if (confirmData.ok) {
              localStorage.setItem('token', confirmData.token);
              window.location.href = 'chat.html';
            } else {
              alert(confirmData.error);
            }
          };
        } else if (data.token) {
          localStorage.setItem('token', data.token);
          window.location.href = 'chat.html';
        } else {
          window.location.href = 'chat.html';  // After register, go to login? Or auto-login?
        }
      } else {
        alert(data.error);
      }
    });
  </script>
</body>
</html>
