<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Messenger - Login/Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-tabs">
        <button id="login-tab" class="tab active">Login</button>
        <button id="register-tab" class="tab">Register</button>
      </div>
      <form id="auth-form">
        <input type="text" id="username" class="input" placeholder="Username" required>
        <input type="password" id="password" class="input" placeholder="Password" required>
        <button type="submit" class="btn primary">Submit</button>
      </form>
    </div>
    <div id="confirm-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <h3>Enter Confirmation Code</h3>
        <p>The code has been sent to your @telegram chat.</p>
        <input type="text" id="code" class="input" placeholder="6-digit code">
        <button id="confirm-btn" class="btn primary">Confirm</button>
      </div>
    </div>
  </div>
  <script>
    const loginTab = document.getElementById('login-tab');
    const registerTab = document.getElementById('register-tab');
    const form = document.getElementById('auth-form');
    const confirmModal = document.getElementById('confirm-modal');
    const confirmBtn = document.getElementById('confirm-btn');
    let isLogin = true;
    let deviceId = localStorage.getItem('deviceId') || crypto.randomUUID();
    localStorage.setItem('deviceId', deviceId);
    let deviceName = navigator.userAgent;

    loginTab.addEventListener('click', () => {
      isLogin = true;
      loginTab.classList.add('active');
      registerTab.classList.remove('active');
    });

    registerTab.addEventListener('click', () => {
      isLogin = false;
      registerTab.classList.add('active');
      loginTab.classList.remove('active');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
      const body = isLogin ? { identifier: username, password, deviceId, deviceName } : { username, password, deviceId, deviceName };

      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();

      if (data.ok) {
        if (data.requireConfirm) {
          confirmModal.style.display = 'flex';
          confirmBtn.onclick = async () => {
            const code = document.getElementById('code').value;
            const confirmRes = await fetch('/api/auth/confirm', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username, code, deviceId })
            });
            const confirmData = await confirmRes.json();
            if (confirmData.ok) {
              localStorage.setItem('token', confirmData.token);
              window.location.href = 'chat.html';
            } else {
              alert(confirmData.error);
            }
          };
        } else if (data.token) {
          localStorage.setItem('token', data.token);
          window.location.href = 'chat.html';
        }
      } else {
        alert(data.error);
      }
    });
  </script>
</body>
</html>
