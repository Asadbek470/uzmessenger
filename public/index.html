<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>One Messenger — Вход</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">OM</div>
    <h1>One Messenger</h1>
    <p class="auth-sub">Вход и регистрация без номера телефона. Нужен только @username и 6-значный PIN.</p>

    <label class="auth-label">Username</label>
    <input id="userInput" class="auth-input" placeholder="@username" autocomplete="username" />

    <label class="auth-label">PIN (6 цифр)</label>
    <input id="pinInput" class="auth-input" placeholder="123456" maxlength="6" inputmode="numeric" autocomplete="current-password" />

    <div class="auth-actions">
      <button class="btn-primary" onclick="handleAuth('login')">Войти</button>
      <button class="btn-ghost" onclick="handleAuth('reg')">Создать аккаунт</button>
    </div>

    <div class="auth-hint">
      PIN нужно запомнить. Без него войти нельзя.
    </div>
  </div>

  <script>
    function normUser(u) {
      return String(u || "").trim().replace(/^@+/, "").toLowerCase();
    }

    async function handleAuth(type) {
      const username = normUser(document.getElementById("userInput").value);
      const pin = String(document.getElementById("pinInput").value || "").trim();

      if (!username || !/^\d{6}$/.test(pin)) {
        alert("Введите username и PIN из 6 цифр.");
        return;
      }

      const res = await fetch(`/api/auth/${type}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, pin })
      });

      const data = await res.json();

      if (!data.success) {
        alert(data.error || "Ошибка.");
        return;
      }

      localStorage.setItem("user", username);
      location.href = "chat.html";
    }
  </script>
</body>
</html>
