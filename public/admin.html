<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — One Messenger</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <h1>Admin Panel</h1>
    <p>Только блокировки и ограничения</p>

    <div class="form">
      <label>Логин</label>
      <input id="adminUser" placeholder="admin" />

      <label>Пароль</label>
      <input id="adminPass" type="password" placeholder="090909" />

      <button class="btn primary" onclick="adminLogin()">Войти</button>
      <div id="aerr" class="error"></div>
    </div>
  </div>

  <div class="admin-wrap hidden" id="adminWrap">
    <div class="admin-top">
      <h2>Пользователи</h2>
      <button class="btn ghost" onclick="adminLogout()">Выйти</button>
    </div>

    <div id="usersTable" class="admin-table"></div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
