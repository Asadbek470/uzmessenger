<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Messenger Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-container">
        <h1>One Messenger • Admin Panel</h1>
        
        <div class="admin-search">
            <input id="searchUser" placeholder="Поиск пользователя @username">
            <button onclick="searchUser()">Найти</button>
        </div>

        <div id="userCard" class="user-card hidden">
            <div class="user-info">
                <img id="userAvatar">
                <div>
                    <h2 id="userName"></h2>
                    <p id="userUsername"></p>
                    <p id="userBio"></p>
                </div>
            </div>

            <div class="admin-actions">
                <button onclick="banUser()" class="danger">Забанить</button>
                <button onclick="unbanUser()" class="success">Разбанить</button>
                <button onclick="muteUser()">Мут</button>
                <button onclick="unmuteUser()">Размут</button>
                <button onclick="deleteUser()" class="danger">Удалить аккаунт</button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
